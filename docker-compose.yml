services:
  qdrant:
    image: qdrant/qdrant:v1.16.2
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  n8n:
    image: n8nio/n8n:2.2.6
    container_name: rag-n8n
    depends_on:
      - qdrant
      - ollama
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Almaty
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "false"
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n:/workflows
      - ./data:/home/node/.n8n-files

volumes:
  qdrant_storage:
  ollama_storage:
  huggingface_cache:
  n8n_storage:
