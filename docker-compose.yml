services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    container_name: rag-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage

  ollama:
    image: ollama/ollama:latest
    container_name: rag-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-app
    depends_on:
      - qdrant
      - ollama
    environment:
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      QDRANT_COLLECTION: kz_companies
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: qwen3.5:4b
      OLLAMA_TEMPERATURE: 0.2
      EMBEDDING_MODEL_NAME: BAAI/bge-m3
      CSV_FILE_PATH: data/sample_companies.csv
      TOP_K: 5
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - huggingface_cache:/models/huggingface

  n8n:
    image: n8nio/n8n:1.86.1
    container_name: rag-n8n
    depends_on:
      - app
    ports:
      - "5678:5678"
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Almaty
    volumes:
      - n8n_storage:/home/node/.n8n
      - ./n8n:/workflows

volumes:
  qdrant_storage:
  ollama_storage:
  huggingface_cache:
  n8n_storage:
